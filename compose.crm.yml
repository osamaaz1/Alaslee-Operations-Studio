# Runs the local PostgreSQL service used only by the CRM module.
services:
  crm-postgres:
    image: postgres:16-alpine
    container_name: alaslee-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CRM_POSTGRES_DB}
      POSTGRES_USER: ${CRM_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD}
    ports:
      - "${CRM_POSTGRES_PORT:-5433}:5432"
    volumes:
      - alaslee_crm_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRM_POSTGRES_USER} -d ${CRM_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  alaslee_crm_postgres:
